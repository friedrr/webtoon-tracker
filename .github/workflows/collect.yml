name: 관심수 수집

on:
  schedule:
    # 매시 30분에 미리 시작 → 스크립트가 다음 정각까지 기다렸다가 수집.
    # GitHub 예약이 최대 30분 밀려도 기록은 항상 정각에 찍힘.
    - cron: "30 * * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼 활성화

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 정각까지 대기 후 관심수 수집
        run: python collect.py

      - name: 데이터 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 대기하는 동안 다른 커밋이 생겼을 수 있으므로 먼저 최신화
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git add data/
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
