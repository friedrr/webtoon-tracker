name: 관심수 수집

on:
  schedule:
    # 백업용: 외부 예약(cron-job.org)이 실패한 시간대만 뒤늦게 메꿈.
    # 이 시간대 기록이 이미 있으면 몇 초 만에 종료됨.
    - cron: "20 * * * *"
  workflow_dispatch:
    inputs:
      trigger:
        description: "실행 출처 (외부 예약 서비스는 cron, 직접 실행은 그대로 두기)"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 관심수 수집
        env:
          TRIGGER_MODE: ${{ inputs.trigger }}
        run: python collect.py

      - name: 데이터 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 대기하는 동안 다른 커밋이 생겼을 수 있으므로 먼저 최신화
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git add data/
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
