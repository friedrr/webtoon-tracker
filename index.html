<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관심수 추적 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#EDF2EE;
    --card:#FFFFFF;
    --ink:#16241D;
    --muted:#5B6B60;
    --accent:#069A57;
    --accent-deep:#0B5B38;
    --soft:#DBEFE3;
    --line:#D5E1D8;
    --warn:#D95B43;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;
    line-height:1.55;
    padding:0 20px 64px;
  }
  .wrap{max-width:880px;margin:0 auto}

  header{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:12px;flex-wrap:wrap;
    padding:28px 2px 16px;
  }
  .title-block .eyebrow{
    font-size:12px;letter-spacing:.16em;color:var(--accent-deep);
    text-transform:uppercase;font-weight:600;margin-bottom:4px;
  }
  h1{
    font-family:"Gowun Batang",serif;font-weight:700;
    font-size:clamp(22px,4vw,30px);line-height:1.3;
  }
  .updated{font-size:13px;color:var(--muted)}

  /* 작품 전환 탭 */
  .tabs{
    display:flex;gap:6px;flex-wrap:wrap;
    margin-bottom:16px;
  }
  .tabs button{
    border:1px solid var(--line);background:var(--card);color:var(--muted);
    font:inherit;font-size:14px;padding:8px 16px;border-radius:999px;cursor:pointer;
  }
  .tabs button:hover{border-color:var(--accent)}
  .tabs button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .tabs button.on{
    background:var(--accent-deep);border-color:var(--accent-deep);
    color:#fff;font-weight:700;
  }

  /* 히어로 */
  .hero{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:30px 28px 26px;margin-bottom:14px;
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
  }
  .hero-label{
    font-family:"Gowun Batang",serif;font-size:15px;color:var(--muted);margin-bottom:6px;
  }
  .hero-count{display:flex;align-items:center;gap:14px}
  .hero-count .num{
    font-size:clamp(44px,9vw,68px);font-weight:800;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;line-height:1;
  }
  .heart{
    width:clamp(30px,5vw,42px);height:auto;flex-shrink:0;
    animation:beat 2.4s ease-in-out infinite;transform-origin:center;
  }
  @keyframes beat{0%,100%{transform:scale(1)}12%{transform:scale(1.07)}24%{transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){.heart{animation:none}}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--soft);color:var(--accent-deep);
    border-radius:999px;padding:8px 16px;font-weight:700;font-size:15px;
    font-variant-numeric:tabular-nums;
  }
  .chip small{font-weight:500;color:var(--muted)}
  .chip.down{background:#F8E4DE;color:var(--warn)}

  /* 스탯 카드 */
  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;margin-bottom:26px;
  }
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat .k{font-size:12.5px;color:var(--muted);margin-bottom:4px}
  .stat .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat .v span{font-size:13px;font-weight:500;color:var(--muted)}

  /* 섹션 */
  section{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 22px 18px;margin-bottom:18px;
  }
  .sec-head{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;flex-wrap:wrap;margin-bottom:14px;
  }
  h2{font-family:"Gowun Batang",serif;font-size:17px;font-weight:700}
  .range{display:flex;gap:4px}
  .range button{
    border:1px solid var(--line);background:transparent;color:var(--muted);
    font:inherit;font-size:13px;padding:5px 12px;border-radius:999px;cursor:pointer;
  }
  .range button:hover{border-color:var(--accent)}
  .range button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .range button.on{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}
  .chart-box{position:relative;height:300px}
  .chart-box.short{height:220px}

  /* 일별 표 */
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  th,td{padding:9px 6px;text-align:right;font-size:14px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted);font-weight:600;font-size:12.5px}
  tr:last-child td{border-bottom:none}
  td.up{color:var(--accent-deep);font-weight:600}
  td.down{color:var(--warn);font-weight:600}

  /* 상태 메시지 */
  .notice{
    background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
    padding:36px 24px;text-align:center;color:var(--muted);font-size:15px;
  }
  .notice strong{display:block;font-family:"Gowun Batang",serif;color:var(--ink);
    font-size:18px;margin-bottom:8px}

  footer{margin-top:28px;text-align:center;font-size:12.5px;color:var(--muted)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <div class="eyebrow">Favorite Tracker</div>
      <h1 id="titleName">관심수 추적</h1>
    </div>
    <div class="updated" id="updatedAt"></div>
  </header>

  <div class="tabs" id="tabs" role="tablist" aria-label="작품 선택"></div>

  <div id="empty" class="notice hidden">
    <strong>아직 수집된 데이터가 없어요</strong>
    GitHub Actions가 첫 실행을 마치면 여기에 추이가 나타납니다.<br>
    저장소의 Actions 탭에서 「관심수 수집」을 수동 실행해 보세요.
  </div>

  <div id="dash" class="hidden">

    <div class="hero">
      <div>
        <div class="hero-label">현재 관심수</div>
        <div class="hero-count">
          <svg class="heart" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="var(--accent)" d="M12 21s-7.5-4.9-10-9.3C.3 8.6 2 5 5.5 5c2 0 3.4 1.1 4.3 2.5.4.6 1.9.6 2.3 0C13 6.1 14.5 5 16.5 5 20 5 21.7 8.6 22 11.7 19.5 16.1 12 21 12 21z"/>
          </svg>
          <div class="num" id="currentCount">–</div>
        </div>
      </div>
      <div class="chip" id="chip24"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">오늘 증가 (KST)</div><div class="v" id="todayDelta">–</div></div>
      <div class="stat"><div class="k">최근 24시간 증가</div><div class="v" id="delta24">–</div></div>
      <div class="stat"><div class="k">시간당 평균 (24h)</div><div class="v" id="hourlyAvg">–</div></div>
      <div class="stat"><div class="k">기록 수</div><div class="v" id="recordCount">–</div></div>
    </div>

    <section>
      <div class="sec-head">
        <h2>관심수 추이</h2>
        <div class="range" id="rangeBtns" role="group" aria-label="조회 기간">
          <button data-h="24">24시간</button>
          <button data-h="72">3일</button>
          <button data-h="168">7일</button>
          <button data-h="0" class="on">전체</button>
        </div>
      </div>
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
    </section>

    <section>
      <div class="sec-head"><h2>시간별 증가량</h2></div>
      <div class="chart-box short"><canvas id="deltaChart"></canvas></div>
    </section>

    <section>
      <div class="sec-head"><h2>일별 기록</h2></div>
      <table>
        <thead><tr><th>날짜</th><th>마감 관심수</th><th>일일 증가</th></tr></thead>
        <tbody id="dailyBody"></tbody>
      </table>
    </section>

  </div>

  <footer>매시간 자동 수집 · GitHub Actions + GitHub Pages</footer>
</div>

<script>
(async function(){
  const $ = id => document.getElementById(id);
  const fmt = n => n.toLocaleString("ko-KR");
  const KST = 9*3600*1000;

  const kstDateKey = t => {
    const d = new Date(t + KST);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  };
  const fmtTime = t => new Intl.DateTimeFormat("ko-KR",
    {timeZone:"Asia/Seoul", month:"numeric", day:"numeric", hour:"numeric", minute:"2-digit"}).format(new Date(t));
  const fmtHour = t => new Intl.DateTimeFormat("ko-KR",
    {timeZone:"Asia/Seoul", hour:"numeric"}).format(new Date(t));
  const signed = n => (n>0?"+":"") + fmt(n);
  const css = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();

  Chart.defaults.font.family = '"Pretendard", sans-serif';
  Chart.defaults.color = css("--muted");

  // 시그니처: 자정(KST)마다 컷 경계선 + 날짜 라벨
  const dayGutter = {
    id:"dayGutter",
    afterDraw(chart){
      const pts = chart.data.rawTimes;
      if(!pts || pts.length < 2) return;
      const {ctx, chartArea:a, scales:{x}} = chart;
      ctx.save();
      let prev = kstDateKey(pts[0]);
      for(let i=1;i<pts.length;i++){
        const key = kstDateKey(pts[i]);
        if(key !== prev){
          const px = (x.getPixelForValue(i-1) + x.getPixelForValue(i)) / 2;
          ctx.strokeStyle = css("--line");
          ctx.lineWidth = 1;
          ctx.setLineDash([4,4]);
          ctx.beginPath(); ctx.moveTo(px, a.top); ctx.lineTo(px, a.bottom); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = css("--muted");
          ctx.font = '11px "Pretendard", sans-serif';
          ctx.textAlign = "left";
          ctx.fillText(key.slice(5).replace("-","/"), px+5, a.top+12);
          prev = key;
        }
      }
      ctx.restore();
    }
  };

  // ---------- 메타 정보 로드 ----------
  let meta = {};
  try{
    const r = await fetch("data/meta.json", {cache:"no-store"});
    if(r.ok) meta = await r.json();
  }catch(e){}

  // 신구 형식 모두 지원: {titles:{id:{...}}} 또는 예전 단일 형식 {titleId, titleName}
  let titles = meta.titles || {};
  let order = meta.titleOrder || Object.keys(titles);
  if(order.length === 0 && meta.titleId){
    titles = {[meta.titleId]: {titleName: meta.titleName}};
    order = [meta.titleId];
  }

  if(order.length === 0){
    $("empty").classList.remove("hidden");
    return;
  }

  // ---------- 작품 탭 ----------
  const tabsEl = $("tabs");
  if(order.length > 1){
    for(const tid of order){
      const b = document.createElement("button");
      b.type = "button";
      b.dataset.tid = tid;
      b.setAttribute("role","tab");
      b.textContent = (titles[tid] && titles[tid].titleName) || tid;
      tabsEl.appendChild(b);
    }
    tabsEl.addEventListener("click", e=>{
      const b = e.target.closest("button");
      if(!b || b.classList.contains("on")) return;
      location.hash = b.dataset.tid;
      select(b.dataset.tid);
    });
  }

  // ---------- 차트/표 상태 ----------
  let trendChart = null, deltaChart = null;
  let rows = [], latest = null, rangeH = 0;

  function drawTrend(){
    const cut = rangeH ? latest.t - rangeH*3600000 : 0;
    const data = rows.filter(r=>r.t >= cut);
    const many = data.length > 60;
    if(trendChart) trendChart.destroy();
    trendChart = new Chart($("trendChart"), {
      type:"line",
      data:{
        labels:data.map(r=>fmtTime(r.t)),
        rawTimes:data.map(r=>r.t),
        datasets:[{
          data:data.map(r=>r.c),
          borderColor:css("--accent"),
          backgroundColor:css("--soft"),
          borderWidth:2, fill:true, tension:.25,
          pointRadius:many?0:2.5, pointHoverRadius:4,
          pointBackgroundColor:css("--accent"),
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:"index", intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>" 관심수 " + fmt(c.parsed.y)}}
        },
        scales:{
          x:{ticks:{maxTicksLimit:7, maxRotation:0}, grid:{display:false}},
          y:{grace:"5%", ticks:{callback:v=>fmt(v)}, grid:{color:css("--line")}}
        }
      },
      plugins:[dayGutter]
    });
  }

  function drawDelta(){
    const deltas = [];
    for(let i=1;i<rows.length;i++){
      deltas.push({t:rows[i].t, d:rows[i].c - rows[i-1].c});
    }
    const recent = deltas.slice(-48);
    if(deltaChart) deltaChart.destroy();
    deltaChart = new Chart($("deltaChart"), {
      type:"bar",
      data:{
        labels:recent.map(r=>fmtHour(r.t)),
        rawTimes:recent.map(r=>r.t),
        datasets:[{
          data:recent.map(r=>r.d),
          backgroundColor:recent.map(r=>r.d < 0 ? css("--warn") : css("--accent")),
          borderRadius:3,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{
            title:items=>fmtTime(recent[items[0].dataIndex].t),
            label:c=>" 증가 " + signed(c.parsed.y)
          }}
        },
        scales:{
          x:{ticks:{maxTicksLimit:12, maxRotation:0}, grid:{display:false}},
          y:{beginAtZero:true, ticks:{callback:v=>fmt(v)}, grid:{color:css("--line")}}
        }
      },
      plugins:[dayGutter]
    });
  }

  function drawTable(){
    const byDay = new Map();
    for(const r of rows) byDay.set(kstDateKey(r.t), r.c);
    const days = [...byDay.entries()];
    const tbody = $("dailyBody");
    tbody.innerHTML = "";
    for(let i=days.length-1; i>=0; i--){
      const [date, close] = days[i];
      const prevClose = i>0 ? days[i-1][1] : null;
      const diff = prevClose === null ? null : close - prevClose;
      const tr = document.createElement("tr");
      const cls = diff === null ? "" : (diff < 0 ? "down" : "up");
      tr.innerHTML = `<td>${date.replace(/-/g,".")}</td>` +
                     `<td>${fmt(close)}</td>` +
                     `<td class="${cls}">${diff===null?"–":signed(diff)}</td>`;
      tbody.appendChild(tr);
    }
  }

  // ---------- 작품 선택 → 데이터 로드 및 렌더 ----------
  async function select(tid){
    document.querySelectorAll("#tabs button").forEach(b=>
      b.classList.toggle("on", b.dataset.tid === tid));

    const info = titles[tid] || {};
    const name = info.titleName || tid;
    $("titleName").textContent = name;
    document.title = name + " · 관심수 추적";

    rows = [];
    try{
      // 신규 파일명 우선, 없으면 예전 history.csv 시도
      let r = await fetch(`data/${tid}.csv`, {cache:"no-store"});
      if(!r.ok) r = await fetch("data/history.csv", {cache:"no-store"});
      if(r.ok){
        const text = await r.text();
        rows = text.trim().split(/\r?\n/).slice(1)
          .map(line=>{
            const [t,c] = line.split(",");
            return {t:new Date(t).getTime(), c:parseInt(c,10)};
          })
          .filter(d=>Number.isFinite(d.t)&&Number.isFinite(d.c))
          .sort((a,b)=>a.t-b.t);
      }
    }catch(e){}

    if(rows.length === 0){
      $("dash").classList.add("hidden");
      $("empty").classList.remove("hidden");
      return;
    }
    $("empty").classList.add("hidden");
    $("dash").classList.remove("hidden");

    latest = rows[rows.length-1];
    $("currentCount").textContent = fmt(latest.c);
    $("updatedAt").textContent = "마지막 기록 " + fmtTime(latest.t);
    $("recordCount").innerHTML = fmt(rows.length) + " <span>회</span>";

    const at = cutoff => {
      let v = null;
      for(const r of rows){ if(r.t <= cutoff) v = r; else break; }
      return v;
    };
    const d = new Date(latest.t + KST);
    const dayStartKst = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()) - KST;
    const base24 = at(latest.t - 24*3600*1000) || rows[0];
    const baseDay = at(dayStartKst) || rows[0];

    const d24 = latest.c - base24.c;
    const dToday = latest.c - baseDay.c;
    const spanH = Math.max((latest.t - base24.t)/3600000, 1);

    $("delta24").textContent = signed(d24);
    $("todayDelta").textContent = signed(dToday);
    $("hourlyAvg").innerHTML = fmt(Math.round(d24/spanH)) + " <span>/시간</span>";

    const chip = $("chip24");
    chip.innerHTML = signed(d24) + " <small>지난 24시간</small>";
    chip.classList.toggle("down", d24 < 0);

    drawTrend();
    drawDelta();
    drawTable();
  }

  // 기간 토글
  $("rangeBtns").addEventListener("click", e=>{
    const b = e.target.closest("button");
    if(!b) return;
    document.querySelectorAll("#rangeBtns button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    rangeH = parseInt(b.dataset.h,10);
    if(latest) drawTrend();
  });

  // 시작: URL 해시(#titleId)로 북마크한 작품이 있으면 그 작품부터
  const initial = order.includes(location.hash.slice(1)) ? location.hash.slice(1) : order[0];
  select(initial);
})();
</script>
</body>
</html>
